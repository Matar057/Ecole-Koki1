{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4>Confirmer la suppression</h4>
                <p>Êtes-vous sûr de vouloir supprimer l'examen "{{ exam.name }}" ?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Supprimer</button>
                    <a href="{% url 'exams:exam_list' %}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
