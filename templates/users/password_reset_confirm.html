{% extends 'auth_base.html' %}
{% block content %}
<div class="auth-card">
    <div class="card shadow">
        <div class="card-body p-4">
            <h3 class="mb-4">Nouveau mot de passe</h3>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">{{ field.label_tag }}{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
                {% endfor %}
                <div class="d-grid"><button type="submit" class="btn btn-primary">Réinitialiser</button></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
