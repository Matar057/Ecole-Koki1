{% extends 'auth_base.html' %}
{% block content %}
<div class="auth-card">
    <div class="card shadow">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Réinitialiser le mot de passe</h3>
            <p class="text-muted">Entrez votre e-mail pour recevoir un lien de réinitialisation.</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">{{ form.email }}</div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Envoyer le lien</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'users:login' %}">Retour à la connexion</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
