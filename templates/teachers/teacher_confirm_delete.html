{% extends 'base.html' %}
{% block title %}Supprimer l'enseignant - ELEMENTAIRE KOKI 1{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card"><div class="card-body text-center">
            <h4>Supprimer l'enseignant ?</h4>
            <p>Êtes-vous sûr de vouloir supprimer <strong>{{ teacher.user.get_full_name }}</strong> ?</p>
            <form method="post">{% csrf_token %}
                <button type="submit" class="btn btn-danger">Oui, supprimer</button>
                <a href="{% url 'teachers:teacher_list' %}" class="btn btn-secondary">Annuler</a>
            </form>
        </div></div>
    </div>
</div>
{% endblock %}
